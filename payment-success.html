<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Successful</title>
</head>
<body>
  <p>Payment received. Redirecting you to scheduling...</p>

<script>
  const params = new URLSearchParams(window.location.search);
  const sessions = parseInt(params.get('sessions') || '0', 10);
  const packageName = params.get('package') || '';
  const amount = params.get('amount') || '';

  const existing = parseInt(localStorage.getItem('sessionsRemaining') || '0', 10);

  if (sessions > 0) {
    localStorage.setItem('sessionsRemaining', String(existing + sessions));
    localStorage.setItem('lastPackageName', packageName);
    localStorage.setItem('lastPaymentAmount', amount);
  }

  // Add ?paid=true flag
  window.location.href = 'payments.html?paid=true';
</script>

</body>
</html>
