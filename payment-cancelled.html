 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Cancelled</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 60px auto;
      padding: 20px;
      line-height: 1.6;
    }

    .message-box {
      background: #f8f8f8;
      border-left: 5px solid #999;
      padding: 20px;
      border-radius: 6px;
    }

    h1 {
      margin-top: 0;
    }

    a.button-link {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 16px;
      text-decoration: none;
      background: #222;
      color: #fff;
      border-radius: 4px;
    }

    a.button-link:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="message-box">
    <h1>Payment Cancelled</h1>
    <p>Your payment was not completed, and no tutoring sessions were added.</p>
    <p>You can return to the payments page whenever you are ready.</p>
    <a class="button-link" href="payments.html">Return to Payments</a>
  </div>
</body>
</html>
